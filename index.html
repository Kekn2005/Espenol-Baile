    const md=(S.missions[m.id]||{}).done||{}; const done=m.tasks.filter((_,i)=>md[i]).length; const full=done===m.tasks.length;
    h+='<div class="card mission"><div class="spread"><b style="font-size:16px">'+m.ic+' &nbsp;'+m.t+'</b>'+(full?stBadge(4):'<span class="muted small">'+done+'/'+m.tasks.length+'</span>')+'</div>';
    h+='<p class="muted small" style="margin:6px 0 4px">'+m.obj+'</p>';
    h+='<div class="bar thin mb" style="margin-top:8px"><i style="width:'+(100*done/m.tasks.length)+'%"></i></div>';
    m.tasks.forEach((tk,i)=>{
      h+='<div class="task'+(md[i]?" done":"")+'"><span class="tk">'+(md[i]?"✓":"")+'</span><span class="t-lbl">'+tk.lbl+'</span>';
      if(!md[i])h+='<button class="btn sm go" onclick="doTask(\''+m.id+'\','+i+')">'+(tk.k==="study"?"Estudiar":tk.k==="write"?"Escribir":tk.k==="cards"?"Repasar":"Empezar")+'</button>';
      h+='</div>';});
    if(full)h+='<p class="small mt" style="color:var(--gold)">★ Logro: '+m.out+'</p>';
    h+='</div>';});
  return h;
}
function markTask(mid,i){const ms=S.missions[mid]||(S.missions[mid]={done:{}});ms.done=ms.done||{};ms.done[i]=true;toast("Micro-tarea completada");render();}
function doTask(mid,i){
  const m=MISSIONS.find(x=>x.id===mid), tk=m.tasks[i];
  if(tk.k==="study"){go('grammar',tk.gt);markTask(mid,i);return;}
  if(tk.k==="drill"){startDrill(tk.gt,tk.n,tk.min,pct=>{if(pct>=tk.min)markTask(mid,i);});return;}
  if(tk.k==="cards"){startCards(tk.f,tk.n,()=>markTask(mid,i),m.t);return;}
  if(tk.k==="vquiz"){openQuiz(m.t+" — vocab quiz",vquizQs(tk.f,tk.n),pct=>{if(pct>=tk.min)markTask(mid,i);},{min:tk.min});return;}
  if(tk.k==="write"){openWrite(m.t,tk.p,tk.ck,()=>markTask(mid,i));return;}
  if(tk.k==="dele"){
    if(tk.id==="r1"){startReading("r1",pct=>{if(pct>=50)markTask(mid,i);});}
    else if(tk.id==="t-rep"){openTrans("t-rep",()=>markTask(mid,i));}
    return;}
}

/* ================= DELE ================= */
let DTAB="write";
function rDele(){
  const tabs=[["write","Writing"],["speak","Speaking"],["trans","Transformations"],["read","Reading"]];
  let h='<div class="pagehead"><h2>DELE Practice</h2><p>Tareas comunicativas al estilo del examen: expresión escrita con checklist y modelo, monólogos y diálogos, transformaciones gramaticales y comprensión lectora con estrategia.</p></div>';
  h+='<div class="filters">'+tabs.map(t=>'<span class="chip clickable'+(DTAB===t[0]?'" style="color:var(--gold);border-color:var(--gold)':"")+'" onclick="DTAB=\''+t[0]+'\';render()">'+t[1]+'</span>').join("")+'</div>';
  if(DTAB==="speak"){ DELE.speak.forEach((s,i)=>{
    h+='<div class="card dele-task"><div class="spread"><b>'+s.t+'</b>'+(S.speakDone[i]?'<span class="state st4">Practiced</span>':"")+'</div><p class="prompt-es">'+s.p+'</p>';
    h+='<div class="model"><b class="small gold">ESTRUCTURAS ÚTILES</b><br>'+s.tips.map(t=>"· <em>"+t+"</em>").join("<br>")+'</div>';
    h+='<button class="btn sm mt" onclick="S.speakDone['+i+']=1;toast(\'Marcada como practicada\');render()">'+(S.speakDone[i]?"Practicar otra vez":"Marcar como practicada")+'</button></div>';});}
  if(DTAB==="write"){ DELE.write.forEach((w,i)=>{
    h+='<div class="card dele-task"><div class="spread"><b>'+w.t+'</b><span class="chip">'+w.w+' palabras</span></div><p class="prompt-es">'+w.p+'</p>';
    h+='<details class="mt"><summary class="small muted" style="cursor:pointer">Ver esqueleto modelo</summary><div class="model">'+w.model+'</div></details>';
    h+='<div class="row mt"><button class="btn sm pri" onclick="deleWrite('+i+')">'+(S.writeDone[i]?"✓ Hecha — repetir":"Escribir ahora")+'</button></div></div>';});}
  if(DTAB==="trans"){ DELE.trans.forEach(set=>{
    const st=S.dele[set.id]||{};
    h+='<div class="card dele-task"><div class="spread"><b>'+set.t+'</b><span class="muted small">'+(st.right||0)+'/'+set.items.length+' bien la última vez</span></div>';
    h+='<p class="small muted">Transforma mentalmente (o por escrito), revela la solución y autoevalúate.</p>';
    h+='<button class="btn sm mt" onclick="openTrans(\''+set.id+'\')">Empezar</button></div>';});}
  if(DTAB==="read"){ DELE.read.forEach(r=>{
    const done=S.dele[r.id];
    h+='<div class="card dele-task"><div class="spread"><b>'+r.t+'</b>'+(done!=null?'<span class="chip">'+done+'%</span>':"")+'</div>';
    h+='<p class="small muted">Estrategia: identifica el tipo de texto, busca paráfrasis (no palabras exactas) y localiza la postura del autor.</p>';
    h+='<button class="btn sm mt" onclick="startReading(\''+r.id+'\')">Leer y responder</button></div>';});}
  return h;
}
function deleWrite(i){const w=DELE.write[i];openWrite(w.t+" ("+w.w+" palabras)",w.p,w.ck,()=>{S.writeDone[i]=1;});}
function startReading(id,onEnd){
  const r=DELE.read.find(x=>x.id===id);
  let h='<div class="mbox" style="max-width:760px"><div class="mhead"><h3>'+r.t+'</h3><button class="xclose" onclick="closeModal()">✕</button></div>';
  h+='<div class="readtext">'+r.text+'</div><button class="btn pri" onclick="readQs(\''+id+'\')">Responder preguntas</button></div>';
  $("#modal").innerHTML=h;$("#modal").classList.add("open");
  window._readEnd=onEnd;
}
function readQs(id){const r=DELE.read.find(x=>x.id===id);
  openQuiz(r.t,r.qs.map(q=>({q:q.q,o:q.o,a:q.a,e:q.e})),pct=>{S.dele[id]=pct;if(window._readEnd)window._readEnd(pct);window._readEnd=null;},{});}
let TR=null;
function openTrans(id,onEnd){
  const set=DELE.trans.find(x=>x.id===id);
  TR={set,i:0,right:0,onEnd,revealed:false};renderTR();$("#modal").classList.add("open");
}
function renderTR(){
  const it=TR.set.items[TR.i];
  let h='<div class="mbox"><div class="mhead"><h3>'+TR.set.t+'</h3><div class="row"><span class="qprog">'+(TR.i+1)+' / '+TR.set.items.length+'</span><button class="xclose" onclick="closeModal()">✕</button></div></div>';
  h+='<div class="qtext">'+it.q+'</div>';
  if(!TR.revealed)h+='<button class="btn pri" onclick="TR.revealed=true;renderTR()">Revelar solución</button>';
  else{h+='<div class="feedback"><b>'+it.a+'</b></div><p class="small muted">¿Lo tenías bien?</p><div class="row"><button class="btn sm" style="border-color:var(--green);color:var(--green)" onclick="trMark(1)">✓ Sí</button><button class="btn sm" style="border-color:var(--red);color:var(--red)" onclick="trMark(0)">✗ No</button></div>';}
  h+='</div>';$("#modal").innerHTML=h;
}
function trMark(ok){ if(ok)TR.right++;TR.i++;TR.revealed=false;
  if(TR.i<TR.set.items.length){renderTR();return;}
  S.dele[TR.set.id]={right:TR.right};
  const cb=TR.onEnd,r=TR.right,n=TR.set.items.length;
  let h='<div class="mbox"><div class="mhead"><h3>'+TR.set.t+'</h3><button class="xclose" onclick="closeModal()">✕</button></div><div class="result-ring">'+r+'/'+n+'</div><p style="text-align:center" class="muted">autoevaluación completada</p><div class="row" style="justify-content:center;margin-top:16px"><button class="btn pri" onclick="closeModal()">Continuar</button></div></div>';
  $("#modal").innerHTML=h; if(cb)cb();
}

/* ================= PROGRESS ================= */
const B1REQ=[["All indicative tenses + imperfecto vs indefinido","impf-indef"],["Perfecto & pluscuamperfecto in narrative","past-narr"],["Present subjunctive — formation","subj-form"],["Present subjunctive — 4 trigger categories","subj-trig"],["Temporal clauses (cuando + subj.)","cuando-subj"],["Por vs para — 11 uses","por-para"],["para vs para que","para-paraque"],["Object pronouns & double pronouns","pronouns"],["Ser vs estar complete","ser-estar"],["Gustar-type verbs","gustar"],["Core connectors","connectors"]];
const B2REQ=[["Imperfect subjunctive & si-clauses (1,2,3, mixed)","si-clauses"],["Perfect & pluperfect subjunctive + sequence of tenses","subj-perf"],["Passive, passive se & impersonal se","passive-se"],["Relative clauses incl. cuyo + mood choice","relatives"],["Reported speech — full backshift","reported"],["Future perfect & conditional perfect","fut-perf"],["Verbs of change & neuter lo","change-adv"],["B2 connector inventory & argumentation","connectors"]];
function reqPct(req){return Math.round(100*req.filter(r=>tLevel(r[1])>=3).length/req.length);}
function rProg(){
  let h='<div class="pagehead"><h2>Progress</h2><p>Dominio por ítem, unidad y fase. Estados: Not started → Learning → Practicing → Reviewed → Mastered.</p></div>';
  h+='<div class="grid g4"><div class="card stat"><div class="n gold">'+progress()+'%</div><div class="l">overall → B2</div></div>';
  h+='<div class="card stat"><div class="n">'+band()+'</div><div class="l">current band</div></div>';
  h+='<div class="card stat"><div class="n">'+reqPct(B1REQ)+'%</div><div class="l">B1 readiness</div></div>';
  h+='<div class="card stat"><div class="n">'+reqPct(B2REQ)+'%</div><div class="l">B2 readiness</div></div></div>';
  h+='<div class="card mt"><h3 class="small gold">PHASE MASTERY</h3>';
  PHASES.forEach(ph=>{const us=UNITS.filter(u=>u.ph===ph.id);const p=Math.round(100*us.filter(u=>(S.units[u.id]||{}).passed).length/us.length);
    h+='<div class="progrow"><span class="pl">'+ph.t+'</span><div class="bar thin"><i style="width:'+p+'%"></i></div><span class="pv">'+p+'%</span></div>';});
  h+='</div>';
  h+='<div class="grid g2 mt"><div class="card"><h3 class="small gold">GRAMMAR TOPICS</h3>';
  GT.forEach(t=>{h+='<div class="spread" style="padding:6px 0;border-bottom:1px solid var(--border)"><a class="small" onclick="go(\'grammar\',\''+t.id+'\')">'+t.t+'</a>'+stBadge(tLevel(t.id))+'</div>';});
  h+='</div><div class="card"><h3 class="small gold">VOCABULARY BY DOMAIN</h3>';
  Object.keys(DOMN).forEach(d=>{const items=ALLCARDS.filter(c=>c.kind==="v"&&c.ref.d===d);if(!items.length)return;
    const p=Math.round(100*items.reduce((s,c)=>s+cardState(c.k).b/3,0)/items.length);
    h+='<div class="progrow"><span class="pl small">'+DOMN[d]+' <span class="faint muted">('+items.length+')</span></span><div class="bar thin"><i style="width:'+p+'%"></i></div><span class="pv">'+p+'%</span></div>';});
  h+='<div class="progrow"><span class="pl small">Grammar recall deck</span><div class="bar thin"><i style="width:'+Math.round(100*GC.reduce((s,_,i)=>s+cardState("g"+i).b/3,0)/GC.length)+'%"></i></div><span class="pv"></span></div>';
  h+='</div></div>';
  // strongest / weakest
  const ranked=GT.map(t=>({t,l:tLevel(t.id),acc:tStat(t.id).a?tStat(t.id).c/tStat(t.id).a:0})).sort((a,b)=>(b.l-a.l)||(b.acc-a.acc));
  const strong=ranked.filter(x=>x.l>=3).slice(0,4), weak=ranked.slice().reverse().filter(x=>tStat(x.t.id).a>0).slice(0,4);
  h+='<div class="grid g2 mt"><div class="card"><h3 class="small gold">STRONGEST AREAS</h3>';
  h+=strong.length?strong.map(x=>'<div class="weakitem"><span>'+x.t.t+'</span>'+stBadge(x.l)+'</div>').join(""):'<div class="empty">Aún por determinar.</div>';
  h+='</div><div class="card"><h3 class="small gold">WEAKEST AREAS</h3>';
  h+=weak.length?weak.map(x=>'<div class="weakitem"><span>'+x.t.t+'</span>'+stBadge(x.l)+'</div>').join(""):'<div class="empty">Haz drills para generar datos.</div>';
  h+='</div></div>';
  h+='<div class="grid g2 mt"><div class="card"><h3 class="small gold">END-OF-B1 CHECKLIST</h3><ul class="readiness">';
  B1REQ.forEach(r=>{const ok=tLevel(r[1])>=3;h+='<li class="'+(ok?"ok":"no")+'"><span>'+(ok?"✓":"○")+'</span> '+r[0]+'</li>';});
  h+='</ul></div><div class="card"><h3 class="small gold">END-OF-B2 CHECKLIST</h3><ul class="readiness">';
  B2REQ.forEach(r=>{const ok=tLevel(r[1])>=3;h+='<li class="'+(ok?"ok":"no")+'"><span>'+(ok?"✓":"○")+'</span> '+r[0]+'</li>';});
  h+='</ul></div></div>';
  h+='<div class="card mt"><div class="spread"><span class="small muted">Review due: '+cardsDue()+' cards · '+weakDrillKeys().length+' weak grammar items</span><div class="row"><button class="btn sm" onclick="go(\'review\')">Open review queue →</button><button class="btn sm ghost" onclick="resetProgress()" style="color:var(--red)">Reset progress</button></div></div></div>';
  return h;
}

UNITS.find(u=>u.id===14).doms=["soc"];
render();
if(cloudOn()){ SYNC.status="…"; SYNC.msg="conectando…"; updSyncTag(); cloudPull(true).then(()=>{SYNC.ready=true;updSyncTag();}); }
else { SYNC.ready=true; }
