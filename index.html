<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camino B2 — Spanish Mastery Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#160a13; --bg2:#1d0e1a; --panel:#241221; --panel2:#2f1830; --border:#3d2038; --border2:#52294a;
  --text:#f5e9f0; --muted:#c69dba; --faint:#8a6079;
  --gold:#eca0c4; --gold2:#d87ba8; --teal:#c79ae6; --blue:#b48fe0; --red:#f07a92; --green:#86cfa0; --purple:#c193e0;
  --lvA2:#a988a0; --lvB1:#c69ae0; --lvB1p:#e69ac8; --lvB2:#f0b0c6;
  --radius:14px; --shadow:0 10px 34px rgba(40,5,30,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font:16px/1.6 'Montserrat',"Segoe UI",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:'Montserrat',"Segoe UI",sans-serif;font-weight:700;letter-spacing:-.2px}
a{color:var(--teal);text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- layout ---------- */
#app{display:flex;min-height:100vh}
#side{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:22px 14px 14px;z-index:20}
#main{flex:1;min-width:0;padding:34px 44px 90px;max-width:1160px}
.brand{padding:0 10px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand h1{font-size:21px;color:var(--gold)}
.brand .sub{font-size:11.5px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;margin-top:3px}
.nav{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}
.nav button{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:15px;text-align:left;transition:.15s;width:100%}
.nav button:hover{background:var(--panel);color:var(--text)}
.nav button.on{background:var(--panel2);color:var(--gold);box-shadow:inset 2px 0 0 var(--gold)}
.nav .ic{width:20px;text-align:center;font-size:16px;opacity:.9}
.nav .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:9px;font-size:10.5px;padding:1px 7px;font-weight:600}
.sideprog{padding:14px 10px 4px;border-top:1px solid var(--border);margin-top:10px}
.sideprog .lbl{font-size:11px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;margin-bottom:6px}
.sideprog .lbl b{color:var(--gold)}

/* ---------- shared ---------- */
.bar{height:7px;background:var(--panel2);border-radius:5px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .5s ease}
.bar.thin{height:5px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
.card.hov{transition:.18s}
.card.hov:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.pagehead{margin-bottom:24px}
.pagehead h2{font-size:27px;margin-bottom:5px}
.pagehead p{color:var(--muted);max-width:720px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);white-space:nowrap}
.chip.lv-A2\+{color:var(--lvA2);border-color:var(--lvA2)}
.chip.lv-B1{color:var(--lvB1);border-color:var(--lvB1)}
.chip.lv-B1\+{color:var(--lvB1p);border-color:var(--lvB1p)}
.chip.lv-B2{color:var(--lvB2);border-color:var(--lvB2)}
.chip.clickable{cursor:pointer}.chip.clickable:hover{background:var(--panel2);color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:10px;font-size:15px;font-weight:600;border:1px solid var(--border2);color:var(--text);background:var(--panel2);transition:.15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.pri{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#2a0f22;border:none}
.btn.pri:hover{filter:brightness(1.08);color:#2a0f22}
.btn.sm{padding:6px 13px;font-size:13.5px}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.4;cursor:not-allowed}
.state{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:6px}
.st0{background:#2a1c28;color:var(--faint)} /* not started */
.st1{background:#342039;color:var(--purple)} /* learning */
.st2{background:#3a2038;color:var(--teal)}  /* practicing */
.st3{background:#3a1e33;color:var(--blue)}  /* reviewed */
.st4{background:#4a2540;color:var(--gold)}  /* mastered */
.stL{background:#241a22;color:var(--faint)} /* locked */
table.mini{width:100%;border-collapse:collapse;font-size:14.5px;margin:10px 0}
table.mini th{color:var(--gold);text-align:left;font-weight:600;padding:6px 10px;border-bottom:1px solid var(--border2);font-size:13.5px}
table.mini td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}
table.mini tr:last-child td{border-bottom:none}
table.mini em{color:var(--teal);font-style:italic}
.muted{color:var(--muted)}.small{font-size:13.5px}.gold{color:var(--gold)}.teal{color:var(--teal)}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.mt{margin-top:14px}.mb{margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:18px 0}
.empty{color:var(--faint);text-align:center;padding:34px;font-style:italic}

/* ---------- dashboard ---------- */
.hero{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:14px}
.hero .big{padding:26px 28px}
.levelchip{display:inline-block;font-family:'Montserrat',sans-serif;font-size:34px;color:var(--gold);border:2px solid var(--gold);border-radius:12px;padding:4px 18px;margin-bottom:8px}
.stat{padding:16px 18px}
.stat .n{font-size:26px;font-family:'Montserrat',sans-serif;color:var(--text)}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
.stat .n .of{font-size:16px;color:var(--faint)}
.weakitem{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14.5px}
.weakitem:last-child{border:none}
.reco{display:flex;gap:12px;align-items:center;background:linear-gradient(135deg,#2e1530,#1d0e1a);border:1px solid var(--border2);border-radius:var(--radius);padding:16px 20px;margin-top:14px}
.reco .ic{font-size:26px}

/* ---------- roadmap ---------- */
.phase{margin-bottom:30px}
.phase>.ph-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.phase>.ph-head h3{font-size:19px}
.unit{display:flex;gap:16px;align-items:flex-start;padding:16px 18px;margin-bottom:10px;cursor:pointer}
.unit .num{font-family:'Montserrat',sans-serif;font-size:20px;color:var(--faint);width:34px;flex-shrink:0;padding-top:2px}
.unit.done .num{color:var(--gold)}
.unit .u-body{flex:1;min-width:0}
.unit h4{font-size:15.5px;margin-bottom:3px}
.unit .u-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.unit.locked{opacity:.55;cursor:default}

/* ---------- unit detail / grammar ---------- */
.back{color:var(--muted);font-size:13px;margin-bottom:14px;display:inline-flex;gap:6px;align-items:center}
.back:hover{color:var(--gold)}
.obj li{margin:5px 0 5px 18px;color:var(--text)}
.topicrow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;margin-bottom:8px;cursor:pointer}
.topicrow:hover{border-color:var(--gold)}
.gt-section{margin:16px 0}
.gt-section h4{color:var(--gold);font-size:15px;letter-spacing:.5px;margin-bottom:6px}
.keypt{margin:4px 0 4px 16px;color:var(--text);font-size:15px}
.keypt em,.gt-ex em{color:var(--teal)}

/* ---------- quiz modal ---------- */
#modal{position:fixed;inset:0;background:rgba(5,7,12,.82);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:40px 16px}
#modal.open{display:flex}
.mbox{background:var(--panel);border:1px solid var(--border2);border-radius:18px;max-width:660px;width:100%;padding:28px 30px;box-shadow:var(--shadow);margin:auto}
.mbox .mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mbox .mhead h3{font-size:17px}
.qprog{font-size:12px;color:var(--faint)}
.qtext{font-size:19px;line-height:1.6;margin:14px 0 18px;font-family:'Montserrat',sans-serif}
.qtext .gap{color:var(--gold);font-weight:700}
.opt{display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:9px;border:1px solid var(--border2);border-radius:11px;background:var(--panel2);font-size:16px;transition:.13s}
.opt:hover{border-color:var(--gold)}
.opt.right{border-color:var(--green);background:#16251b;color:var(--green)}
.opt.wrong{border-color:var(--red);background:#2a1a1e;color:var(--red)}
.opt:disabled{cursor:default;opacity:.9}
.feedback{border-left:3px solid var(--teal);background:var(--bg2);padding:12px 16px;border-radius:0 10px 10px 0;font-size:15px;margin:12px 0;color:var(--muted)}
.feedback b{color:var(--text)}
.xclose{font-size:20px;color:var(--faint);padding:4px 8px}.xclose:hover{color:var(--red)}
.result-ring{font-family:'Montserrat',sans-serif;font-size:44px;text-align:center;margin:16px 0 4px;color:var(--gold)}

/* ---------- flashcards ---------- */
.fc-stage{perspective:1200px;max-width:560px;margin:20px auto}
.fc{position:relative;width:100%;min-height:270px;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.fc.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--border2);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.fc-face.bk{transform:rotateY(180deg);border-color:var(--gold)}
.fc-word{font-family:'Montserrat',sans-serif;font-size:30px;margin:8px 0}
.fc-ex{color:var(--teal);font-style:italic;font-size:16px;margin-top:12px}
.fc-tag{position:absolute;top:14px;left:16px;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
.fc-hint{position:absolute;bottom:12px;font-size:11px;color:var(--faint);left:0;right:0;text-align:center}
.rate{display:flex;gap:10px;justify-content:center;margin-top:18px}
.rate button{flex:1;max-width:120px;padding:11px 6px;border-radius:11px;font-weight:700;font-size:13px;border:1px solid var(--border2);background:var(--panel2);transition:.14s}
.rate .r0:hover{border-color:var(--red);color:var(--red)}
.rate .r1:hover{border-color:var(--purple);color:var(--purple)}
.rate .r2:hover{border-color:var(--teal);color:var(--teal)}
.rate .r3:hover{border-color:var(--gold);color:var(--gold)}
.deckbtn{padding:14px 16px;text-align:left;cursor:pointer}
.deckbtn:hover{border-color:var(--gold)}
.deckbtn .n{font-size:20px;font-family:'Montserrat',sans-serif;color:var(--gold)}

/* ---------- vocab ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.vrow{display:grid;grid-template-columns:1.1fr 1fr 1.4fr auto;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:14.5px;align-items:center}
.vrow:hover{background:var(--panel2)}
.vrow .es{color:var(--text);font-weight:600}
.vrow .ex{color:var(--faint);font-style:italic}
.vhead{color:var(--gold);font-size:11.5px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border2)}

/* ---------- missions ---------- */
.mission{padding:18px 20px;margin-bottom:12px}
.task{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:15px}
.task:last-child{border:none}
.task .tk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.task.done .tk{background:var(--gold);border-color:var(--gold);color:#2a0f22}
.task.done .t-lbl{color:var(--faint);text-decoration:line-through}
.task .go{margin-left:auto}

/* ---------- dele ---------- */
.dele-task{padding:16px 18px;margin-bottom:10px}
.prompt-es{font-family:'Montserrat',sans-serif;font-size:17px;color:var(--text);margin:8px 0;line-height:1.6}
.model{background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;padding:12px 16px;margin-top:10px;font-size:15px;color:var(--muted)}
.model em{color:var(--teal)}
textarea.write{width:100%;min-height:130px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:12px 14px;font:14px/1.6 "Segoe UI",sans-serif;resize:vertical;margin-top:10px}
textarea.write:focus{outline:none;border-color:var(--gold)}
.checklist label{display:flex;gap:9px;align-items:center;padding:5px 0;font-size:14.5px;color:var(--muted);cursor:pointer}
.readtext{background:var(--bg2);border-left:3px solid var(--gold);padding:14px 18px;border-radius:0 10px 10px 0;font-size:14.5px;line-height:1.75;margin:10px 0;font-family:'Montserrat',sans-serif}

/* ---------- progress ---------- */
.progrow{display:flex;align-items:center;gap:14px;padding:8px 0;font-size:14.5px}
.progrow .pl{width:230px;flex-shrink:0;color:var(--text)}
.progrow .bar{flex:1}
.progrow .pv{width:44px;text-align:right;color:var(--muted);font-size:12px}
.readiness li{margin:6px 0 6px 4px;list-style:none;font-size:14.5px;display:flex;gap:9px;align-items:baseline}
.readiness .ok{color:var(--green)}.readiness .no{color:var(--faint)}

/* ---------- sync ---------- */
.synclab{display:block;font-size:11px;color:var(--faint);letter-spacing:.6px;text-transform:uppercase;margin:12px 0 4px}
.synci{width:100%;height:40px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--text);padding:0 12px;font:13px/1.4 Consolas,monospace}
.synci:focus{outline:none;border-color:var(--gold)}
.nav #synctag{font-size:12px}

/* ---------- toast ---------- */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel2);border:1px solid var(--gold);color:var(--text);padding:11px 22px;border-radius:12px;font-size:15px;transition:.3s;z-index:200;opacity:0;box-shadow:var(--shadow)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media (max-width:980px){
  .hero,.g3,.g4{grid-template-columns:repeat(2,1fr)}
  #main{padding:24px 20px 120px}
}
@media (max-width:760px){
  #app{flex-direction:column}
  #side{width:100%;height:auto;position:fixed;bottom:0;top:auto;flex-direction:row;padding:6px 8px;border-top:1px solid var(--border);border-right:none;background:rgba(11,14,20,.96);backdrop-filter:blur(8px)}
  .brand,.sideprog{display:none}
  .nav{flex-direction:row;overflow-x:auto;gap:2px;width:100%}
  .nav button{flex-direction:column;gap:3px;font-size:9.5px;padding:7px 9px;flex-shrink:0}
  .nav .badge{position:absolute;margin:0;top:2px;right:2px}
  .nav button{position:relative}
  .hero,.g2,.g3,.g4{grid-template-columns:1fr}
  .vrow{grid-template-columns:1fr 1fr;gap:6px}
  .vrow .ex{grid-column:1/-1}
  #main{padding:20px 14px 140px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <div class="brand"><h1>Camino B2</h1><div class="sub">Spanish Mastery Studio</div></div>
    <nav class="nav" id="nav"></nav>
    <div class="sideprog">
      <div class="lbl"><span>Rumbo a B2</span><b id="sideprogpct">0%</b></div>
      <div class="bar thin"><i id="sideprogbar" style="width:0%"></i></div>
    </div>
  </aside>
  <main id="main"></main>
</div>
<div id="modal"></div>
<div id="toast"></div>
<script>
window.onerror=function(msg,src,line){
  var d=document.createElement("div");
  d.style.cssText="position:fixed;top:12px;left:12px;right:12px;background:#4a1520;border:1px solid #e0707a;color:#ffd9dd;padding:12px 16px;border-radius:10px;z-index:9999;font:12.5px/1.5 Consolas,monospace";
  d.textContent="⚠ Error interno: "+msg+" (línea "+line+"). Haz una captura y compártela para arreglarlo.";
  document.body.appendChild(d);
};
// watchdog: if the app hasn't rendered shortly after load, say so instead of staying blank
window.addEventListener("load",function(){
  setTimeout(function(){
    var m=document.getElementById("main");
    if(m && !m.innerHTML.trim() && !document.querySelector("#modal.open")){
      m.innerHTML='<div style="padding:40px;max-width:560px"><h2 style="color:#eca0c4;font-family:'Montserrat',sans-serif">La app no ha podido iniciarse</h2><p style="color:#96a0b5;margin-top:10px">El código no se ha ejecutado. Prueba a abrir este archivo con Microsoft Edge o Google Chrome (clic derecho → Abrir con). Si ves este mensaje dentro de Edge/Chrome, haz una captura y compártela.</p></div>';
    }
  },1500);
});
</script>
<script>
/* ================= GRAMMAR TOPICS (part A) ================= */
const GT=[
{id:"subj-form",t:"Present Subjunctive — Formation",lv:"B1",
s:"Take the yo form of the present indicative, drop the -o, add the OPPOSITE vowel endings (-ar verbs take -e endings; -er/-ir verbs take -a endings). Any verb with an irregular -go yo form keeps that irregularity in ALL subjunctive forms.",
tbl:{h:["Infinitive","Yo (indic.)","Stem","Subjunctive (yo…ellos)"],r:[
["hablar","hablo","habl-","hable, hables, hable, hablemos, habléis, hablen"],
["comer","como","com-","coma, comas, coma, comamos, comáis, coman"],
["tener","tengo","teng-","tenga, tengas, tenga, tengamos, tengáis, tengan"],
["hacer","hago","hag-","haga, hagas, haga, hagamos, hagáis, hagan"],
["conocer","conozco","conozc-","conozca, conozcas…"],
["ir","—","vay-","vaya, vayas, vaya, vayamos, vayáis, vayan"],
["ser","—","se-","sea, seas, sea, seamos, seáis, sean"],
["estar","—","esté","esté, estés, esté, estemos, estéis, estén"],
["saber","—","sep-","sepa, sepas, sepa, sepamos, sepáis, sepan"],
["haber","—","hay-","haya (hay → haya)"]]},
pts:["The <em>-go trick</em>: tengo → tenga, salgo → salga, pongo → ponga, digo → diga, oigo → oiga.","Fully irregular set to memorize: <em>vaya, sea, esté, sepa, haya, dé (dar)</em>.","-car/-gar/-zar verbs change spelling: buscar → busque, llegar → llegue, empezar → empiece."],
d:[
{q:"Es necesario que todos los médicos ___ el protocolo.",o:["conocen","conozcan","conocieran"],a:1,e:"Es necesario que + present subjunctive. Conocer → yo conozco → conozca(n). The -zco irregularity carries into the subjunctive."},
{q:"Quiero que ___ (tú) al congreso conmigo.",o:["vengas","vienes","vendrás"],a:0,e:"Querer que triggers subjunctive. Venir → vengo → venga/vengas (the -go trick)."},
{q:"Ojalá ___ una vacuna pronto.",o:["hay","haya","habrá"],a:1,e:"Ojalá always takes subjunctive. Haber → haya."},
{q:"Es urgente que el paciente ___ a urgencias ahora mismo.",o:["va","vaya","irá"],a:1,e:"Ir is fully irregular in the subjunctive: vaya, vayas, vaya…"},
{q:"Espero que la reunión no ___ mucho.",o:["dura","dure","duraba"],a:1,e:"Esperar que + subjunctive. Durar → dure (-ar verb takes -e endings)."},
{q:"Dudo que ellos ___ la respuesta.",o:["saben","sepan","sabrán"],a:1,e:"Dudar que + subjunctive. Saber is irregular: sepa, sepas, sepan."},
{fix:1,q:"Corrige el error: «Es importante que el equipo <b>llega</b> a tiempo.»",o:["llega → llegue","llega → llegara","Es → Sea"],a:0,e:"Es importante que triggers present subjunctive: llegar → llegue (note the -gu- spelling change)."},
{fix:1,q:"Corrige el error: «No creo que el hospital <b>tiene</b> camas libres.»",o:["tiene → tenga","creo → crea","tiene → tuvo"],a:0,e:"No creer que = negated belief → subjunctive. Tener → tengo → tenga."}]},

{id:"subj-trig",t:"Subjunctive Triggers — The 4 Categories",lv:"B1",
s:"About 95% of B1 subjunctive usage comes from four trigger categories: (1) Wishes and desires, (2) Emotions, (3) Impersonal expressions (es + adjective + que), (4) Doubt and negated belief. If the subject of both verbs is the same, use the infinitive instead.",
tbl:{h:["Category","Triggers","Example"],r:[
["1 · Wishes","querer que, esperar que, pedir que, necesitar que, preferir que","Quiero que el paciente <em>descanse</em> más."],
["2 · Emotions","alegrarse de que, sentir que, tener miedo de que, molestar que, preocupar que","Me preocupa que el paciente no <em>mejore</em>."],
["3 · Impersonal","es importante/necesario/posible/mejor/una lástima que","Es fundamental que todos <em>conozcan</em> el protocolo."],
["4 · Doubt","no creer que, dudar que, no pensar que, quizás, tal vez, ojalá","No creo que ese tratamiento <em>sea</em> eficaz."]]},
pts:["Same subject → infinitive: <em>Quiero descansar</em> (NOT quiero que yo descanse).","Affirmative belief keeps the indicative: <em>Creo que TIENE razón</em> vs <em>No creo que TENGA razón</em>.","Es verdad que / es evidente que / es obvio que → INDICATIVE (certainty, not opinion)."],
d:[
{q:"El médico pide que la familia ___ fuera.",o:["espera","espere","esperará"],a:1,e:"Pedir que = wish/request → subjunctive: espere."},
{q:"Me alegra que los resultados ___ buenos.",o:["son","sean","serán"],a:1,e:"Alegrar = emotion trigger → subjunctive: sean."},
{q:"Creo que el tratamiento ___ eficaz.",o:["es","sea","fuera"],a:0,e:"Affirmative creer que → INDICATIVE. Only negated belief (no creo que) takes subjunctive."},
{q:"No pienso que ___ necesario operar.",o:["es","sea","será"],a:1,e:"No pensar que = negated belief → subjunctive: sea."},
{q:"Quiero ___ más sobre este caso.",o:["que sepa","saber","que sé"],a:1,e:"Same subject (yo quiero, yo sé) → infinitive: Quiero saber. No que-clause needed."},
{q:"Es evidente que el paciente ___ mejor hoy.",o:["esté","está","estuviera"],a:1,e:"Es evidente que expresses certainty → INDICATIVE. Compare: Es posible que esté mejor (subj.)."},
{q:"Tal vez ___ una segunda opinión.",o:["necesitemos","necesitamos","necesitaremos"],a:0,e:"Tal vez expressing uncertainty → subjunctive: necesitemos."},
{fix:1,q:"Corrige el error: «Espero que <b>tienes</b> razón, doctor.»",o:["tienes → tengas","Espero → Espere","razón → la razón"],a:0,e:"Esperar que = wish → subjunctive: tengas."}]},

{id:"cuando-subj",t:"Temporal Clauses — cuando + Subjunctive",lv:"B1",
s:"Time connectors take the subjunctive when they point to the FUTURE (the event has not happened yet). With past or habitual reference, they take the indicative. Antes de que ALWAYS takes subjunctive.",
tbl:{h:["Connector","Future reference","Example"],r:[
["cuando","+ subjunctive","Cuando <em>llegues</em> al hospital, llámame."],
["hasta que","+ subjunctive","Espera hasta que <em>llegue</em> el radiólogo."],
["en cuanto","+ subjunctive","En cuanto <em>salga</em> de la reunión, te aviso."],
["tan pronto como","+ subjunctive","Tan pronto como <em>sepa</em> los resultados, te digo."],
["antes de que","SIEMPRE subjunctive","Llama antes de que <em>operen</em> al paciente."],
["a menos que","SIEMPRE subjunctive","Voy a menos que <em>haya</em> una emergencia."],
["siempre que (condition)","+ subjunctive","Puedes salir siempre que <em>termines</em> el informe."]]},
pts:["Past / habitual → INDICATIVE: <em>Cuando era residente, trabajaba 80 horas.</em>","<em>Cuando llegaba tarde, siempre llamaba</em> — habitual past, no subjunctive.","Con tal de que, para que, a fin de que → always subjunctive."],
d:[
{q:"Cuando ___ los resultados, te llamo enseguida.",o:["tengo","tenga","tendré"],a:1,e:"Future reference after cuando → subjunctive: tenga."},
{q:"Cuando ___ residente, hacía guardias cada semana.",o:["sea","era","fuera"],a:1,e:"Past description → indicative imperfect: era. No subjunctive for real past events."},
{q:"Espera aquí hasta que ___ el especialista.",o:["viene","venga","vendrá"],a:1,e:"Hasta que + future event → subjunctive: venga."},
{q:"Firma el consentimiento antes de que ___ la cirugía.",o:["empieza","empiece","empezará"],a:1,e:"Antes de que ALWAYS takes subjunctive: empiece."},
{q:"En cuanto ___ el alta, el paciente volverá a casa.",o:["reciba","recibe","recibirá"],a:0,e:"En cuanto + pending future event → subjunctive: reciba."},
{q:"Cuando ___ a la consulta, siempre trae sus informes.",o:["venga","viene","viniera"],a:1,e:"Habitual present (siempre) → indicative: viene."},
{q:"No saldré de guardia a menos que me ___ el jefe.",o:["autoriza","autorice","autorizará"],a:1,e:"A menos que always takes subjunctive: autorice."},
{fix:1,q:"Corrige el error: «Te aviso tan pronto como <b>llegan</b> los análisis.»",o:["llegan → lleguen","aviso → avise","tan pronto → pronto"],a:0,e:"Tan pronto como + future → subjunctive: lleguen (llegar → llegue, -gu- spelling)."}]},

{id:"para-paraque",t:"para vs para que — Purpose Clauses",lv:"B1",
s:"Same subject → para + infinitive. Different subjects → para que + subjunctive. The same logic applies to the formal pairs con el fin de / a fin de que and sin / sin que.",
tbl:{h:["Structure","When","Example"],r:[
["para + infinitive","same subject","Estudio <em>para aprender</em>. (yo estudio, yo aprendo)"],
["para que + subjunctive","different subjects","Te lo explico <em>para que lo entiendas</em>."],
["con el fin de + inf.","formal, same subject","Se reunieron <em>con el fin de negociar</em>."],
["a fin de que + subj.","formal, different subjects","Lo publicaron <em>a fin de que se conozcan</em> los datos."],
["sin + inf. / sin que + subj.","same / different","Salió <em>sin decir</em> nada. / Salió <em>sin que nadie lo viera</em>."]]},
pts:["Never say <em>para que yo</em> + same subject — collapse it to para + infinitive.","Para que NEVER takes indicative."],
d:[
{q:"El médico habla despacio ___ el paciente lo entienda.",o:["para","para que","porque"],a:1,e:"Different subjects (médico habla / paciente entiende) → para que + subjunctive."},
{q:"Estudio español ___ trabajar en un hospital de Madrid.",o:["para","para que","por"],a:0,e:"Same subject (yo estudio, yo trabajo) → para + infinitive."},
{q:"Te presto el manual para que lo ___ antes del examen.",o:["revisas","revises","revisar"],a:1,e:"Para que + subjunctive: revises."},
{q:"Cerró la puerta sin que nadie se ___ cuenta.",o:["dio","diera","da"],a:1,e:"Sin que + subjunctive; past context → imperfect subjunctive diera."},
{q:"Vine ___ ayudarte con el informe.",o:["para que","para","a que"],a:1,e:"Same subject → para + infinitive: para ayudarte."},
{fix:1,q:"Corrige el error: «Repito la dosis para que el paciente la <b>recuerda</b>.»",o:["recuerda → recuerde","para que → para","la → lo"],a:0,e:"Para que always takes subjunctive: recuerde."},
{q:"Le di mi número a fin de que me ___ cualquier cambio.",o:["comunique","comunica","comunicar"],a:0,e:"A fin de que (formal para que) + subjunctive: comunique."},
{fix:1,q:"Corrige el error: «Trabajo mucho <b>para que yo consiga</b> la plaza.»",o:["para que yo consiga → para conseguir","consiga → consigo","para que → porque"],a:0,e:"Same subject → collapse to para + infinitive: para conseguir la plaza."}]},

{id:"por-para",t:"Por vs Para — The 11 Uses",lv:"A2+",
s:"PARA looks forward (goal, recipient, deadline, destination, opinion). POR looks at the cause or the path (reason, duration, means, exchange, on behalf of, movement through). Fixed expressions must be memorized as chunks.",
tbl:{h:["PARA","Example","POR","Example"],r:[
["Purpose/goal","Estudio <em>para</em> aprender.","Cause/reason","Llegué tarde <em>por</em> el tráfico."],
["Recipient","Este libro es <em>para</em> ti.","Duration","Trabajé <em>por</em> doce horas."],
["Deadline","El informe es <em>para</em> el lunes.","Means","Te llamo <em>por</em> teléfono."],
["Destination","Sale <em>para</em> Alejandría.","Exchange","Lo compré <em>por</em> veinte euros."],
["Opinion","<em>Para</em> mí, es necesario.","On behalf of","Firmó <em>por</em> su jefe."],
["—","—","Movement through","Caminamos <em>por</em> el hospital."]]},
pts:["<em>Lo hice por ti</em> (for your sake — cause) vs <em>Lo hice para ti</em> (made for you — recipient).","<em>Salgo por la mañana</em> (time of day) vs <em>Termínalo para la mañana</em> (deadline).","POR chunks: por fin, por lo menos, por eso, por supuesto, por lo tanto, por si acaso, por lo visto.","PARA chunks: para siempre, para nada, para colmo, ¿para qué?, no es para tanto."],
d:[
{q:"El informe tiene que estar listo ___ el viernes.",o:["por","para"],a:1,e:"Deadline → para el viernes."},
{q:"Llegamos tarde ___ la tormenta.",o:["por","para"],a:0,e:"Cause/reason → por la tormenta."},
{q:"___ mí, este protocolo es el más seguro.",o:["Por","Para"],a:1,e:"Opinion → Para mí."},
{q:"Cambié mi turno ___ el de mi colega.",o:["por","para"],a:0,e:"Exchange → por."},
{q:"Paseamos ___ el casco antiguo de Sevilla.",o:["por","para"],a:0,e:"Movement through a space → por."},
{q:"Estas flores son ___ la enfermera del turno de noche.",o:["por","para"],a:1,e:"Recipient → para."},
{q:"Firmé el acta ___ el director, que estaba de viaje.",o:["por","para"],a:0,e:"On behalf of / in place of → por."},
{q:"Salimos mañana ___ Buenos Aires.",o:["por","para"],a:1,e:"Destination → para Buenos Aires."},
{q:"___ lo visto, van a recortar el presupuesto.",o:["Por","Para"],a:0,e:"Fixed expression: por lo visto = apparently."},
{fix:1,q:"Corrige el error: «Gracias <b>para</b> tu ayuda con la ponencia.»",o:["para → por","Gracias → Gracia","tu → su"],a:0,e:"Thanking = cause of gratitude → gracias POR tu ayuda."}]},

{id:"ser-estar",t:"Ser vs Estar — Complete System",lv:"A2+",
s:"SER defines and classifies (identity, origin, profession, inherent traits, time, material, true passive). ESTAR locates and describes states (location, temporary conditions, emotions, progressive, results of change). A set of adjectives shifts meaning depending on the verb.",
tbl:{h:["Adjective","con SER","con ESTAR"],r:[
["aburrido","boring (personality)","bored (state)"],
["listo","clever","ready"],
["malo","bad / evil","sick / ill"],
["rico","rich (person)","delicious (food)"],
["vivo","lively / sharp","alive"],
["seguro","safe (thing/place)","sure / certain (person)"],
["bueno","good (character)","tasty / in good shape"]]},
pts:["Location of people and objects → ESTAR: <em>El paciente está en la UCI.</em> But events → SER: <em>La reunión es en la sala 3.</em>","Result of a change → ESTAR: <em>El tejido está inflamado. La herida está cerrada.</em>","Profession/identity → SER: <em>Es cirujana. Soy médico.</em>","True passive → SER + participle: <em>Fue operado por el jefe de cirugía.</em>"],
d:[
{q:"El paciente ___ en la UCI desde anoche.",o:["es","está"],a:1,e:"Location of a person → estar."},
{q:"La doctora Ruiz ___ de Valencia.",o:["es","está"],a:0,e:"Origin → ser."},
{q:"¡Qué rica ___ esta paella!",o:["es","está"],a:1,e:"Rico with estar = delicious right now (taste as experienced)."},
{q:"Mi hijo ___ muy listo: aprendió a leer a los cuatro años.",o:["es","está"],a:0,e:"Ser listo = clever (inherent trait). Estar listo = to be ready."},
{q:"¿Ya ___ (tú) listo? El taxi llega en cinco minutos.",o:["eres","estás"],a:1,e:"Estar listo = ready. Ser listo would mean clever."},
{q:"La conferencia ___ en el auditorio central.",o:["es","está"],a:0,e:"Events take SER for location: la conferencia es en… (exception to the location rule)."},
{q:"La herida ya ___ cerrada; no hay signos de infección.",o:["es","está"],a:1,e:"Result of a change / current state → estar + participle."},
{q:"El bisturí ___ de acero inoxidable.",o:["es","está"],a:0,e:"Material → ser de acero."},
{q:"El paciente ___ muy nervioso antes de la cirugía.",o:["es","está"],a:1,e:"Emotion / temporary state → estar nervioso."},
{fix:1,q:"Corrige el error: «Mi abuelo <b>es</b> malo desde el lunes; tiene fiebre alta.»",o:["es → está","malo → mal","tiene → tenga"],a:0,e:"Estar malo = to be ill. Ser malo = to be a bad person."}]},

{id:"pronouns",t:"Object Pronouns — Double Pronouns & le → se",lv:"A2+",
s:"Order is always: indirect before direct (me lo, te la, nos los). When le/les would appear before lo/la/los/las, it becomes SE: le lo → se lo. Position: before conjugated verbs; attached to infinitives, gerunds and affirmative imperatives.",
tbl:{h:["Context","Position","Example"],r:[
["Conjugated verb","before","<em>Te llamo</em> mañana."],
["Infinitive","attached OR before","<em>Voy a llamarte / Te voy a llamar.</em>"],
["Gerund","attached OR before","<em>Estoy explicándotelo / Te lo estoy explicando.</em>"],
["Affirmative imperative","attached","<em>¡Dímelo! ¡Explícaselo!</em>"],
["Negative imperative","before","<em>¡No me lo expliques así!</em>"]]},
pts:["le/les + lo/la/los/las → SE + lo/la/los/las: <em>¿Le diste el informe? — Sí, se lo di.</em>","Attaching pronouns often requires a written accent: explica → explícaselo, di → dímelo.","Indirect object is usually doubled: <em>Le mandé los resultados al cardiólogo.</em>"],
d:[
{q:"¿Le diste el informe al jefe? — Sí, ___ di ayer.",o:["le lo","se lo","lo le"],a:1,e:"le + lo → se lo. Never say le lo."},
{q:"¿Les mandaste los resultados? — Ya ___ mandé.",o:["se los","les los","se les"],a:0,e:"les + los → se los."},
{q:"La receta… ___ ahora mismo. (dar, a usted, imperativo afirmativo)",o:["Se la doy","Désela","Se dé la"],a:1,e:"Affirmative imperative: pronouns attach → dé + se + la = désela."},
{q:"No ___ expliques así; usa términos sencillos.",o:["me lo","lo me","melo"],a:0,e:"Negative imperative: pronouns BEFORE the verb, indirect first: no me lo expliques."},
{q:"Estoy preparando la presentación. Estoy ___ .",o:["preparándola","la preparando","preparando la"],a:0,e:"With gerund, attach: preparándola (accent keeps the stress)."},
{q:"¿Puedes enviarme el historial? — Sí, voy a ___ ahora.",o:["enviártelo","te lo enviar","enviarlo te"],a:0,e:"Attach both to the infinitive: enviár + te + lo, indirect before direct."},
{q:"A mis padres ___ compré un regalo en Sevilla.",o:["los","les","se"],a:1,e:"Indirect object (to/for them) → les. Los would be direct object."},
{fix:1,q:"Corrige el error: «El análisis… <b>le lo</b> entregué al paciente esta mañana.»",o:["le lo → se lo","le lo → lo le","entregué → entregado"],a:0,e:"le + lo must become se lo."}]},

{id:"gustar",t:"Gustar-Type Verbs",lv:"B1+",
s:"With gustar-type verbs the THING is the grammatical subject and the person is an indirect object: Me gusta la medicina / Me gustan los idiomas. The same pattern covers encantar, interesar, molestar, doler, faltar, parecer, quedar, sobrar, apetecer, preocupar, sorprender, costar, bastar.",
tbl:{h:["Verb","Meaning","Example"],r:[
["encantar","to love","Me encanta operar."],
["doler","to hurt","Le duele la cabeza."],
["faltar","to be lacking","Me faltan dos horas de formación."],
["quedar","to have left","Me quedan tres guardias este mes."],
["apetecer","to feel like","¿Te apetece un café?"],
["costar","to find difficult","Me cuesta hablar en público."],
["preocupar","to worry","Me preocupa el estado del paciente."],
["sobrar","to have left over","Nos sobra tiempo para revisar el caso."]]},
pts:["Verb agrees with the THING: me gusta el café / me gustan los cafés.","Clarify or emphasize with a + person: <em>A mi jefe le molesta el ruido.</em>","Followed by an infinitive → singular: <em>Me encanta viajar.</em>"],
d:[
{q:"A mi jefe ___ los congresos internacionales.",o:["le encanta","le encantan","se encantan"],a:1,e:"Subject = los congresos (plural) → encantan; indirect object le."},
{q:"¿ ___ duele la garganta desde ayer?",o:["Te","Tú","Ti"],a:0,e:"Doler takes an indirect object pronoun: ¿Te duele…?"},
{q:"Me ___ dos firmas para cerrar el expediente.",o:["falta","faltan","falto"],a:1,e:"Subject = dos firmas (plural) → faltan."},
{q:"A nosotros ___ el nuevo horario de guardias.",o:["nos preocupa","preocupamos","nos preocupamos"],a:0,e:"Preocupar works like gustar: the schedule worries us → nos preocupa."},
{q:"Me ___ mucho levantarme temprano los domingos.",o:["cuesta","cuestan","cuesto"],a:0,e:"Infinitive subject → singular: me cuesta levantarme."},
{q:"¿Os ___ salir a cenar después del turno?",o:["apetece","apetecéis","apetecen"],a:0,e:"Apetecer + infinitive → singular: os apetece salir."},
{fix:1,q:"Corrige el error: «A los residentes <b>le</b> interesan los ensayos clínicos.»",o:["le → les","interesan → interesa","los → las"],a:0,e:"Plural person (a los residentes) → les interesan."},
{fix:1,q:"Corrige el error: «Me <b>gustan</b> mucho nadar por la mañana.»",o:["gustan → gusta","Me → A mí","nadar → la natación"],a:0,e:"Infinitive as subject → singular: me gusta nadar."}]},

{id:"impf-indef",t:"Imperfecto vs Indefinido — Narrative Core",lv:"B1",
s:"The most tested B1 contrast. IMPERFECTO paints the background: descriptions, ongoing states, habits, interrupted actions. INDEFINIDO advances the story: completed events, sequences, sudden changes. A good narrative weaves both.",
tbl:{h:["Function","Imperfecto","Indefinido"],r:[
["Role","background / state / description","foreground / event / action"],
["Time frame","duration, no endpoint","completed, specific time"],
["Habitual","✓ Siempre iba al médico","✗"],
["Interrupted","Dormía cuando…","…sonó el teléfono"],
["Sequence","✗","✓ Entró, revisó y recetó"],
["Triggers","siempre, normalmente, cuando era niño, todos los días","ayer, de repente, en ese momento, finalmente, una vez"]]},
pts:["Model: <em>Era una tarde tranquila. El médico revisaba los historiales cuando, de repente, entró una enfermera.</em>","Meaning shifts: <em>sabía</em> (knew) vs <em>supe</em> (found out); <em>conocía</em> (knew sb) vs <em>conocí</em> (met); <em>podía</em> (was able) vs <em>pude</em> (managed to); <em>quería</em> (wanted) vs <em>quiso</em> (tried) / <em>no quiso</em> (refused)."],
d:[
{q:"___ (llover) cuando llegué al hospital.",o:["Llovió","Llovía","Ha llovido"],a:1,e:"Background/ongoing action interrupted by another → imperfecto: llovía."},
{q:"Ayer ___ (yo, operar) a tres pacientes.",o:["operaba","operé","he operado"],a:1,e:"Completed action, specific time (ayer) → indefinido: operé."},
{q:"Cuando era estudiante, ___ todos los días en la biblioteca.",o:["estudié","estudiaba","he estudiado"],a:1,e:"Habitual past (todos los días) → imperfecto: estudiaba."},
{q:"De repente, el paciente ___ el conocimiento.",o:["perdía","perdió","ha perdido"],a:1,e:"Sudden completed event (de repente) → indefinido: perdió."},
{q:"El médico ___ alto y ___ bata blanca.",o:["fue / llevó","era / llevaba","era / llevó"],a:1,e:"Physical description in the past → imperfecto for both: era alto y llevaba bata blanca."},
{q:"Anoche ___ (yo, saber) que habían cancelado el congreso.",o:["sabía","supe","sé"],a:1,e:"Supe = I found out (event). Sabía = I already knew (state)."},
{q:"Entró, ___ el historial y recetó el tratamiento.",o:["revisaba","revisó","había revisado"],a:1,e:"Sequence of completed events → indefinido: entró, revisó, recetó."},
{q:"Antes ___ (nosotros, vivir) cerca del centro de salud.",o:["vivimos","vivíamos","hemos vivido"],a:1,e:"Antes + ongoing past situation → imperfecto: vivíamos."},
{fix:1,q:"Corrige el error: «Mientras el cirujano <b>operó</b>, la residente tomaba notas.»",o:["operó → operaba","tomaba → tomó","Mientras → Durante"],a:0,e:"Two simultaneous background actions with mientras → both imperfecto: operaba… tomaba."},
{q:"No ___ (ella, querer) firmar el consentimiento y se fue.",o:["quería","quiso","querría"],a:1,e:"No quiso = refused (completed decision). No quería = didn't feel like (state)."}]},
/* ================= GRAMMAR TOPICS (part B) ================= */
{id:"past-narr",t:"Perfecto, Pluscuamperfecto & Modals",lv:"B1+",
s:"Perfecto compuesto (he hablado) links recent past to the present (hoy, esta semana, ya, todavía no, alguna vez). Pluscuamperfecto (había hablado) marks a past action BEFORE another past action. Modals: deber = obligation, deber de = deduction, hay que = impersonal necessity.",
tbl:{h:["Tense","Narrative role","Trigger"],r:[
["Indefinido","main events (foreground)","Entonces, llegó…"],
["Imperfecto","background / habit","Era / Estaba / Tenía"],
["Perfecto compuesto","recent, current relevance","Este año ha habido…"],
["Pluscuamperfecto","prior events","Ya había terminado cuando…"]]},
pts:["Irregular participles: hecho, dicho, escrito, vuelto, puesto, abierto, muerto, roto, visto, cubierto.","<em>Debe trabajar más</em> = obligation. <em>Debe de estar en reunión</em> = deduction.","<em>Hay que</em> + infinitive = impersonal necessity: Hay que respetar el protocolo.","In Latin America the indefinido often replaces the perfecto compuesto."],
d:[
{q:"¿ ___ (tú, leer) el informe? — Todavía no lo he leído.",o:["Leíste","Has leído","Habías leído"],a:1,e:"Todavía no / ya link the action to the present → perfecto compuesto: ¿Has leído…?"},
{q:"Cuando llegué al quirófano, el paciente ya ___ el conocimiento.",o:["perdió","había perdido","ha perdido"],a:1,e:"Action before another past action → pluscuamperfecto: había perdido."},
{q:"Este año ___ (yo, asistir) a tres congresos.",o:["asistí","he asistido","asistía"],a:1,e:"Este año = period including the present → he asistido."},
{q:"No pudo explicar por qué no ___ antes al médico.",o:["fue","había ido","ha ido"],a:1,e:"Prior to the past reference point → había ido."},
{q:"El doctor no contesta. ___ estar en el quirófano.",o:["Debe","Debe de","Hay que"],a:1,e:"Deduction/assumption → debe de estar."},
{q:"___ actuar de inmediato; es una emergencia.",o:["Hay que","Debe de","Tiene"],a:0,e:"Impersonal necessity → hay que actuar."},
{q:"Usted ___ tomar la medicación con las comidas.",o:["debe de","debe","hay que"],a:1,e:"Direct obligation → debe tomar (no de)."},
{fix:1,q:"Corrige el error: «Nunca he <b>escribido</b> un artículo en español.»",o:["escribido → escrito","he → había","Nunca → Jamás nunca"],a:0,e:"Escribir has an irregular participle: escrito."}]},

{id:"si-clauses",t:"Si-Clauses & the Imperfect Subjunctive",lv:"B2",
s:"Three types plus mixed. Type 1 (real): si + presente → futuro/imperativo. Type 2 (hypothetical): si + imperfecto de subjuntivo → condicional. Type 3 (counterfactual past): si + pluscuamperfecto de subjuntivo → condicional compuesto. Imperfect subjunctive: ellos-preterite minus -ron + -ra endings (fueron → fuera).",
tbl:{h:["Type","Si-clause","Main clause","Example"],r:[
["1 · Real","si + presente","futuro / imperativo","Si <em>tienes</em> síntomas, <em>ve</em> al médico."],
["2 · Hypothetical","si + impf. subj.","condicional","Si <em>tuviera</em> tiempo, <em>investigaría</em> más."],
["3 · Counterfactual","si + plusc. subj.","cond. compuesto","Si <em>hubiera estudiado</em>, <em>habría aprobado</em>."],
["Mixed","si + plusc. subj.","condicional","Si <em>hubiera estudiado</em> más, ahora <em>hablaría</em> mejor."]]},
pts:["Key stems from the ellos-preterite: fueron→fuera, tuvieron→tuviera, pudieron→pudiera, supieron→supiera, hicieron→hiciera, dijeron→dijera, quisieron→quisiera, hubieron→hubiera.","NEVER si + condicional (*si tendría*) and never si + presente de subjuntivo (*si tenga*).","Como si + imperfect subjunctive: <em>Habla como si supiera todo.</em>","Ojalá + impf. subj. = unlikely wish: <em>Ojalá tuviera más tiempo.</em>"],
d:[
{q:"Si ___ (yo, tener) más tiempo, estudiaría árabe.",o:["tendría","tuviera","tenga"],a:1,e:"Type 2 hypothetical: si + imperfect subjunctive (tuviera) → conditional."},
{q:"Si tienes fiebre alta, ___ al médico hoy mismo.",o:["irías","ve","fueras"],a:1,e:"Type 1 real condition: si + presente → imperative (ve) or future."},
{q:"Si ___ (nosotros, poder) contratar más personal, mejoraría la atención.",o:["podríamos","pudiéramos","podamos"],a:1,e:"Type 2: pudieron → pudiéramos. Never conditional after si."},
{q:"Si hubiera llegado antes, ___ atender al paciente.",o:["podría haber","habría podido","pude"],a:1,e:"Type 3 counterfactual: main clause takes condicional compuesto: habría podido."},
{q:"Habla de medicina como si ___ especialista.",o:["es","fuera","sea"],a:1,e:"Como si ALWAYS takes imperfect (or pluperfect) subjunctive: fuera."},
{q:"Ojalá ___ (ellos, aumentar) el presupuesto sanitario.",o:["aumenten","aumentaran","aumentarían"],a:1,e:"Ojalá + imperfect subjunctive = wish seen as unlikely: aumentaran. (Aumenten = still possible.)"},
{q:"Si el ensayo ___ concluido, ya tendríamos los datos.",o:["hubiera","habría","haya"],a:0,e:"Mixed conditional: si + pluscuamperfecto de subjuntivo (hubiera concluido) → present result."},
{fix:1,q:"Corrige el error: «Si <b>tendría</b> más recursos, atendería a más pacientes.»",o:["tendría → tuviera","atendería → atienda","Si → Aunque"],a:0,e:"Si never takes the conditional: si tuviera… atendería."},
{q:"¿ ___ usted explicarme el diagnóstico? (petición muy cortés)",o:["Pudiera","Podría","Pueda"],a:1,e:"Polite request → conditional: ¿Podría…? (Quisiera/pudiera also exist as very formal set phrases.)"},
{fix:1,q:"Corrige el error: «Si hubiera sabido la verdad, te la <b>habré</b> dicho.»",o:["habré → habría","hubiera → habría","sabido → supido"],a:0,e:"Type 3: condicional compuesto in the main clause → habría dicho."}]},

{id:"subj-perf",t:"Perfect Subjunctives & Sequence of Tenses",lv:"B2",
s:"Perfecto de subjuntivo (haya + participio) = completed action with present relevance after a present trigger. Pluscuamperfecto de subjuntivo (hubiera + participio) = action prior to a past reference. The sequence-of-tenses rule decides which subjunctive follows which main verb.",
tbl:{h:["Main clause","Subjunctive needed","Example"],r:[
["Presente / Futuro","presente de subj.","Quiero que <em>venga</em>."],
["Presente + completed action","perfecto de subj.","Me alegra que <em>hayas superado</em> la operación."],
["Pretérito / Imperfecto / Condicional","imperfecto de subj.","Quería que <em>viniera</em>."],
["Past + prior action","pluscuamperfecto de subj.","No creía que <em>hubiera llegado</em>."]]},
pts:["haya, hayas, haya, hayamos, hayáis, hayan + participio.","hubiera, hubieras, hubiera, hubiéramos, hubierais, hubieran + participio.","<em>Es posible que ya hayan publicado los resultados.</em>","<em>Ojalá hubiera estudiado medicina tropical.</em> — regret about the past."],
d:[
{q:"Me alegra que ___ (tú, superar) la operación sin complicaciones.",o:["superes","hayas superado","superaras"],a:1,e:"Present emotion about a COMPLETED action → perfecto de subjuntivo: hayas superado."},
{q:"El médico quería que el paciente ___ más.",o:["descanse","descansara","haya descansado"],a:1,e:"Past main verb (quería) → imperfect subjunctive: descansara."},
{q:"Es posible que ya ___ los resultados.",o:["hayan publicado","publiquen","hubieran publicado"],a:0,e:"Possibility about a recently completed action → perfecto de subj.: hayan publicado."},
{q:"No creía que el diagnóstico ___ correcto.",o:["sea","fuera","haya sido"],a:1,e:"Past doubt (no creía) → imperfect subjunctive: fuera."},
{q:"Me pidió que le ___ el informe antes del viernes.",o:["envíe","enviara","haya enviado"],a:1,e:"Past request → imperfect subjunctive: enviara."},
{q:"Ojalá ___ (yo, estudiar) más idiomas cuando era joven.",o:["estudiara","hubiera estudiado","haya estudiado"],a:1,e:"Regret about an unchangeable past → pluscuamperfecto de subj.: hubiera estudiado."},
{q:"Era importante que todos ___ el protocolo.",o:["supieran","sepan","hayan sabido"],a:0,e:"Past impersonal expression → imperfect subjunctive: supieran."},
{fix:1,q:"Corrige el error: «Espero que la reunión de ayer <b>salga</b> bien.»",o:["salga → haya salido","Espero → Esperaba","ayer → mañana"],a:0,e:"Present hope about a completed past event → perfecto de subjuntivo: haya salido."}]},

{id:"passive-se",t:"Passive, Passive se & Impersonal se",lv:"B2",
s:"True passive: ser + participle (agrees with subject) + por + agent — formal register. Passive se: se + 3rd person verb agreeing with the thing — the default when the agent is unknown or irrelevant. Impersonal se: se + 3rd person SINGULAR only — unspecified human agent. Estar + participle = resulting state, not action.",
tbl:{h:["Structure","Use","Example"],r:[
["ser + participio (+ por)","formal, agent stated","El paciente <em>fue operado por</em> el cirujano jefe."],
["se pasiva (3.ª sg/pl)","agent unknown/irrelevant","<em>Se publicaron</em> los resultados."],
["se impersonal (3.ª sg)","unspecified people","<em>Se dice que</em> el tratamiento es eficaz."],
["estar + participio","resulting state","La herida <em>está cerrada</em>."],
["se accidental","unintentional event","<em>Se me cayó</em> el bolígrafo."]]},
pts:["Participle agreement in the true passive: <em>La vacuna fue aprobadA. Los estudios fueron publicadOS.</em>","Passive se agrees: <em>Se necesita experiencia / Se necesitan enfermeros.</em>","Contrast: <em>La puerta fue abierta por el enfermero</em> (action) vs <em>La puerta está abierta</em> (state)."],
d:[
{q:"El fármaco ___ aprobado por la EMA el mes pasado.",o:["estuvo","fue","era"],a:1,e:"True passive, completed action with agent → fue aprobado por…"},
{q:"___ los resultados del ensayo en octubre.",o:["Se publicó","Se publicaron","Fueron publicado"],a:1,e:"Passive se agrees with los resultados (plural) → se publicaron."},
{q:"___ que el nuevo tratamiento es muy prometedor.",o:["Se dicen","Se dice","Es dicho"],a:1,e:"Impersonal se is always 3rd person SINGULAR: se dice que…"},
{q:"No te preocupes: el quirófano ya ___ preparado.",o:["es","está","fue"],a:1,e:"Resulting state (it is ready now) → estar + participio."},
{q:"La vacuna fue ___ tras diez años de investigación.",o:["aprobado","aprobada","aprobados"],a:1,e:"Participle agrees with la vacuna (fem. sg.) → aprobada."},
{q:"___ enfermeros con experiencia en UCI.",o:["Se necesita","Se necesitan","Está necesitado"],a:1,e:"Passive se with plural noun → se necesitan enfermeros."},
{q:"¡Qué desastre! ___ cayó el café encima del teclado.",o:["Se me","Me se","Se"],a:0,e:"Accidental se: se + indirect object pronoun: se me cayó. (Me se does not exist.)"},
{q:"En este hospital ___ árabe, francés y español.",o:["se hablan","se habla","son hablados"],a:0,e:"Passive se with plural (tres idiomas) → se hablan."},
{fix:1,q:"Corrige el error: «Los informes <b>fueron revisado</b> por el comité.»",o:["revisado → revisados","fueron → estuvieron","por → para"],a:0,e:"The participle must agree with los informes → revisados."}]},

{id:"relatives",t:"Relative Clauses — que, quien, cuyo, lo que",lv:"B2",
s:"que covers people and things; quien(es) only people (esp. after prepositions); el que / el cual after prepositions or in formal register; lo que for abstract ideas; cuyo expresses possession and agrees with the thing possessed. Indicative for known/existing antecedents, subjunctive for unknown or non-existent ones.",
tbl:{h:["Pronoun","Refers to","Example"],r:[
["que","people + things","El médico <em>que</em> operó… / El fármaco <em>que</em> recetó…"],
["quien / quienes","people (after prep.)","El especialista <em>a quien</em> consulté…"],
["el/la que, los/las que","with prepositions","La empresa <em>para la que</em> trabajo…"],
["el cual / la cual","formal, with prep.","El protocolo <em>del cual</em> hablamos…"],
["lo que","abstract / neuter","<em>Lo que</em> me preocupa es el pronóstico."],
["cuyo/a/os/as","possession","El paciente <em>cuyos</em> resultados son…"]]},
pts:["Indicative = the thing exists: <em>Tengo una colega que HABLA árabe.</em>","Subjunctive = may not exist: <em>Busco una colega que HABLE árabe.</em>","Negated antecedent → subjunctive: <em>No hay ningún tratamiento que CURE esta enfermedad.</em>","Cuyo agrees with what is possessed, not the possessor: <em>la investigadora cuyos artículos…</em>"],
d:[
{q:"Busco un médico que ___ árabe y español.",o:["habla","hable","hablará"],a:1,e:"Unknown/possibly non-existent antecedent → subjunctive: hable."},
{q:"Tengo una colega que ___ tres idiomas.",o:["hable","habla","hablara"],a:1,e:"She exists and I know her → indicative: habla."},
{q:"No hay ningún fármaco que ___ esta enfermedad por completo.",o:["cura","cure","curará"],a:1,e:"Negated antecedent (ningún) → subjunctive: cure."},
{q:"El paciente ___ resultados llegaron ayer necesita seguimiento.",o:["que sus","cuyos","de quien los"],a:1,e:"Possession → cuyo, agreeing with resultados: cuyos resultados."},
{q:"La conferencia ___ asistí fue excelente.",o:["a la que","que","a cuyo"],a:0,e:"Preposition + article + que: la conferencia a la que asistí."},
{q:"___ más me preocupa es la falta de personal.",o:["Que","Lo que","El que"],a:1,e:"Abstract idea (the thing that) → lo que."},
{q:"El colega con ___ colaboro es epidemiólogo.",o:["que","quien","cuyo"],a:1,e:"After a preposition, for a person → quien: con quien colaboro."},
{fix:1,q:"Corrige el error: «La doctora <b>cuya</b> artículos fueron premiados dará la charla.»",o:["cuya → cuyos","cuya → quien","artículos → artículas"],a:0,e:"Cuyo agrees with artículos (masc. pl.) → cuyos artículos."}]},

{id:"reported",t:"Reported Speech — Estilo Indirecto",lv:"B2",
s:"With a past reporting verb (dijo que…), tenses shift back: presente → imperfecto; indefinido/perfecto → pluscuamperfecto; futuro → condicional; imperativo → imperfecto de subjuntivo. Pronouns and time adverbs also shift (hoy → ese día, mañana → al día siguiente).",
tbl:{h:["Direct","Reported (past verb)"],r:[
["Presente — «Tengo fiebre.»","Imperfecto — Dijo que <em>tenía</em> fiebre."],
["Indefinido — «Llegué a tiempo.»","Pluscuamperfecto — Explicó que <em>había llegado</em> a tiempo."],
["Futuro — «Vendré mañana.»","Condicional — Prometió que <em>vendría</em> al día siguiente."],
["Imperativo — «¡Descanse!»","Impf. subjuntivo — Me indicó que <em>descansara</em>."],
["Pregunta — «¿Tomas la medicación?»","Preguntó <em>si tomaba</em> la medicación."]]},
pts:["Adverb shifts: aquí→allí, ahora→entonces, hoy→ese día, mañana→al día siguiente, ayer→el día anterior, este→ese/aquel.","No backshift when the reporting verb is in the present, or when the statement is still true.","Reported questions keep question-word order but no inversion marks: <em>Me preguntó cuándo había sido la última vez.</em>"],
d:[
{q:"«Tengo fiebre.» → Dijo que ___ fiebre.",o:["tiene","tenía","tuviera"],a:1,e:"Presente → imperfecto in reported speech: tenía."},
{q:"«Vendré mañana.» → Prometió que ___ al día siguiente.",o:["vendrá","vendría","viniera"],a:1,e:"Futuro → condicional: vendría. Mañana → al día siguiente."},
{q:"«¡Descanse en cama!» → El médico me indicó que ___ en cama.",o:["descanse","descansara","descansaría"],a:1,e:"Commands → imperfect subjunctive: descansara."},
{q:"«Llegué tarde por el tráfico.» → Explicó que ___ tarde.",o:["llegó","había llegado","llegara"],a:1,e:"Indefinido → pluscuamperfecto: había llegado."},
{q:"«¿Toma usted la medicación?» → Me preguntó ___ la medicación.",o:["si tomaba","que tomara","si tome"],a:0,e:"Yes/no question → preguntar si + backshifted indicative: si tomaba."},
{q:"«Operaremos hoy.» → Dijeron que operarían ___ .",o:["hoy","ese día","este día"],a:1,e:"Hoy shifts to ese día when reporting later."},
{q:"«La Tierra gira alrededor del Sol.» → El profesor explicó que la Tierra ___ .",o:["giraba","gira","girara"],a:1,e:"Still-true general facts need no backshift: gira (giraba is also accepted, but the cleanest choice keeps the truth present)."},
{fix:1,q:"Corrige el error: «Me pidió que le <b>envío</b> el informe.»",o:["envío → enviara","pidió → pide","le → lo"],a:0,e:"Past request → imperfect subjunctive: que le enviara."}]},

{id:"connectors",t:"Connectors & Discourse Organization",lv:"B2",
s:"B2 argumentation needs a full connector repertoire: cause (ya que, puesto que, dado que, debido a), consequence (por lo tanto, en consecuencia, de ahí que + SUBJ), contrast (sin embargo, no obstante, en cambio), concession (aunque, a pesar de que, si bien, por más que + SUBJ), reformulation (es decir, o sea) and summary (en definitiva, en suma).",
tbl:{h:["Function","Connectors","Grammar"],r:[
["Cause","porque, ya que, puesto que, dado que, debido a (que)","+ indicative"],
["Consequence","por lo tanto, así que, en consecuencia, de ahí que","<em>de ahí que</em> + subjunctive"],
["Contrast","sin embargo, no obstante, en cambio, ahora bien","+ indicative"],
["Concession","aunque, a pesar de que, si bien, por más que, aun cuando","mixed moods"],
["Reformulation","es decir, o sea, en otras palabras, dicho de otro modo","+ indicative"],
["Summary","en definitiva, en resumen, en conclusión, en suma","+ indicative"]]},
pts:["Aunque + indicative = known fact (even though): <em>Aunque está cansado, trabaja bien.</em>","Aunque + subjunctive = hypothetical (even if): <em>Aunque esté cansado, vendrá.</em>","De ahí que is the classic trap: it ALWAYS takes subjunctive: <em>De ahí que sea tan importante.</em>","Spoken markers: pues, bueno, o sea, a ver, de hecho, en fin, total, sin duda."],
d:[
{q:"Aunque ___ cansado, el cirujano decidió operar. (hecho conocido)",o:["esté","estaba","estuviera"],a:1,e:"Known fact → aunque + indicative: estaba."},
{q:"Iré a la reunión aunque ___ que quedarme hasta tarde. (no lo sé aún)",o:["tengo","tenga","tendré"],a:1,e:"Hypothetical concession (even if) → aunque + subjunctive: tenga."},
{q:"No hay suficiente personal; ___ los tiempos de espera sean tan largos.",o:["por eso","de ahí que","así que"],a:1,e:"Followed by subjunctive (sean) → de ahí que, the only one requiring subjunctive."},
{q:"El estudio era pequeño; ___ , los resultados son prometedores.",o:["sin embargo","porque","es decir"],a:0,e:"Contrast between two ideas → sin embargo."},
{q:"___ el tratamiento es caro, la sanidad pública lo cubre.",o:["A pesar de que","Debido a que","Con tal de que"],a:0,e:"Concession (despite the fact that) → a pesar de que."},
{q:"La incidencia bajó un 40%, ___ , casi la mitad.",o:["o sea","no obstante","dado que"],a:0,e:"Reformulation/clarification → o sea."},
{q:"___ no había pruebas concluyentes, se suspendió el ensayo.",o:["Dado que","De ahí que","En cambio"],a:0,e:"Cause, fronted → dado que + indicative."},
{q:"Por más que ___ , no logro memorizar estos verbos.",o:["estudio","estudie","estudiaré"],a:1,e:"Por más que (no matter how much) → subjunctive: estudie."},
{fix:1,q:"Corrige el error: «En definitiva, de ahí que la prevención <b>es</b> fundamental.»",o:["es → sea","En definitiva → Definitivamente","fundamental → fundamentales"],a:0,e:"De ahí que always triggers subjunctive: sea."}]},

{id:"fut-perf",t:"Future Perfect & Conditional Perfect",lv:"B2",
s:"Futuro perfecto (habré + participio): action completed before a future point, or conjecture about the recent past. Condicional compuesto (habría + participio): counterfactual past results, past probability, and future-perfect-in-the-past for reported speech.",
tbl:{h:["Tense","Use","Example"],r:[
["Futuro perfecto","done before a future point","Para junio <em>habré terminado</em> la especialidad."],
["Futuro perfecto","conjecture about recent past","¿<em>Habrán llegado</em> ya los resultados?"],
["Condicional compuesto","counterfactual (type 3)","Si hubiera estudiado, <em>habría aprobado</em>."],
["Condicional compuesto","past probability","<em>Habría llegado</em> tarde, como siempre."],
["Condicional compuesto","reported future perfect","Dijo que para julio <em>habría terminado</em>."]]},
pts:["Futuro simple for present conjecture: <em>¿Dónde estará el doctor? — Estará en urgencias.</em>","Futuro perfecto for past-of-present conjecture: <em>Habrá salido ya.</em> (He must have left already.)"],
d:[
{q:"Para el año que viene, ___ (yo, terminar) la residencia.",o:["terminaré","habré terminado","habría terminado"],a:1,e:"Completed before a future reference point → futuro perfecto: habré terminado."},
{q:"No contesta al teléfono. ¿ ___ ya del hospital?",o:["Saldrá","Habrá salido","Habría salido"],a:1,e:"Conjecture about a recently completed action → futuro perfecto: habrá salido."},
{q:"Si me hubieran avisado antes, ___ el vuelo.",o:["cambiaría","habría cambiado","habré cambiado"],a:1,e:"Type 3 counterfactual → condicional compuesto: habría cambiado."},
{q:"Dijo que para diciembre ___ el proyecto.",o:["habrá terminado","habría terminado","terminara"],a:1,e:"Reported future perfect → condicional compuesto: habría terminado."},
{q:"¿Dónde estará Marta? — ___ en la reunión de servicio.",o:["Estará","Estaría","Habrá estado"],a:0,e:"Conjecture about the PRESENT → futuro simple: estará."},
{q:"Llamé a las diez pero no estaba; ___ las once cuando por fin contestó.",o:["Serán","Serían","Habrán sido"],a:1,e:"Probability about the past → condicional: serían las once."},
{fix:1,q:"Corrige el error: «Para 2030 los hospitales <b>habrían</b> digitalizado todos los historiales.»",o:["habrían → habrán","digitalizado → digitalizados","Para → Por"],a:0,e:"Future deadline (para 2030) → futuro perfecto: habrán digitalizado."}]},

{id:"change-adv",t:"Verbs of Change & Advanced Structures",lv:"B2",
s:"Spanish has no single verb for 'to become': hacerse (gradual/voluntary), volverse (involuntary character change), ponerse (sudden state), quedarse (resulting state), convertirse en (transformation), llegar a ser (achievement over time). Plus: neuter lo, adjective position shifts, cuanto más… más….",
tbl:{h:["Verb","Nuance","Example"],r:[
["hacerse","gradual, voluntary (profession, ideology)","<em>Se hizo</em> médico."],
["volverse","involuntary change of character","<em>Se volvió</em> muy desconfiado."],
["ponerse","sudden physical/emotional state","<em>Se puso</em> nervioso antes de operar."],
["quedarse","resulting state (often loss)","<em>Se quedó</em> sin palabras."],
["convertirse en","fundamental transformation + noun","<em>Se convirtió en</em> el mejor cirujano."],
["llegar a ser","eventual achievement with effort","<em>Llegó a ser</em> jefa de servicio."]]},
pts:["Neuter lo + adjective = abstract noun: <em>Lo difícil es el diagnóstico diferencial.</em>","Adjective position shifts meaning: <em>un viejo amigo</em> (long-time) vs <em>un amigo viejo</em> (elderly); <em>un gran hombre</em> (great) vs <em>un hombre grande</em> (big).","Cuanto más estudies, más aprenderás. (+subj. for future)","A lo mejor + INDICATIVE: <em>A lo mejor viene mañana.</em> But puede que + subjunctive."],
d:[
{q:"Después de años de estudio, ___ cardióloga.",o:["se volvió","se hizo","se puso"],a:1,e:"Gradual, voluntary change into a profession → hacerse: se hizo cardióloga."},
{q:"___ pálido en cuanto vio la aguja.",o:["Se hizo","Se puso","Se convirtió"],a:1,e:"Sudden physical state → ponerse: se puso pálido."},
{q:"Tras el accidente, ___ una persona muy prudente.",o:["se volvió","se puso","llegó a ser"],a:0,e:"Involuntary change of character → volverse."},
{q:"Empezó de auxiliar y ___ directora del hospital.",o:["se puso","llegó a ser","se quedó"],a:1,e:"Achievement after effort/time → llegar a ser."},
{q:"___ más difícil de este idioma es el subjuntivo.",o:["El","Lo","La"],a:1,e:"Abstract quality → neuter lo: lo más difícil."},
{q:"Cuanto más ___ , más rápido progresarás.",o:["practicas","practiques","practicarás"],a:1,e:"Cuanto más + subjunctive for future reference: practiques."},
{q:"Es un ___ : lleva veinte años en mi vida.",o:["amigo viejo","viejo amigo"],a:1,e:"Before the noun = long-standing: un viejo amigo. After = elderly."},
{q:"___ viene el jefe esta tarde; no es seguro.",o:["A lo mejor","Puede que","Ojalá que"],a:0,e:"A lo mejor + INDICATIVE (viene). Puede que would need subjunctive (venga)."},
{fix:1,q:"Corrige el error: «Mi colega <b>se puso</b> vegetariano el año pasado.»",o:["se puso → se hizo","vegetariano → vegetariana","el año pasado → hace un año"],a:0,e:"Adopting a lifestyle/ideology → hacerse: se hizo vegetariano. Ponerse is for momentary states."}]}
];

{es:"dedicarse a",en:"to devote oneself to",t:"v",d:"daily",lv:"A2+",ex:"¿A qué te dedicas? — Soy médico."},
{es:"madrugar",en:"to get up very early",t:"v",d:"daily",lv:"B1",ex:"Los días de quirófano madrugo mucho."},

function tfetch(u,o,ms){ const c=new AbortController(); const to=setTimeout(()=>c.abort(),ms||9000); return fetch(u,Object.assign({signal:c.signal},o||{})).finally(()=>clearTimeout(to)); }

const cardKey=(kind,i)=>kind+i;

const ALLCARDS=[]; // {k, kind:'v'|'g', ref}

/* ---------- derived stats ---------- */
function tStat(id){ return S.gt[id]||{a:0,c:0,best:0}; }
function tLevel(id){ const s=tStat(id); if(s.a===0)return 0; const acc=s.c/s.a;
  if(s.c>=10&&acc>=.8&&s.best>=85)return 4; if(s.c>=6&&acc>=.7)return 3; if(s.c>=4)return 2; return 1; }
const STNAME=["Not started","Learning","Practicing","Reviewed","Mastered"];
function stBadge(l){return '<span class="state st'+l+'">'+STNAME[l]+'</span>';}
function cardsMastered(){return ALLCARDS.filter(c=>cardState(c.k).b===3).length;}
function cardsDue(){return ALLCARDS.filter(c=>{const s=cardState(c.k);return s.seen>0&&s.b<3;}).length;}
function gScore(){return GT.reduce((s,t)=>s+tLevel(t.id)/4,0)/GT.length;}
function vScore(){return ALLCARDS.reduce((s,c)=>s+cardState(c.k).b/3,0)/ALLCARDS.length;}
function uScore(){return UNITS.filter(u=>(S.units[u.id]||{}).passed).length/UNITS.length;}
function progress(){return Math.round(45*gScore()+35*vScore()+20*uScore());}
function band(){const p=progress();return p<18?"A2+":p<48?"B1":p<75?"B1+":"B2";}
function unitInfo(u){return S.units[u.id]||(S.units[u.id]={});}
function unitAvail(u,idx){ if(idx===0)return true; const ui=unitInfo(u); if(ui.unlocked)return true;
  const prev=UNITS[idx-1]; return !!(S.units[prev.id]||{}).passed; }
function unitState(u,idx){ const ui=unitInfo(u);
  if(!unitAvail(u,idx))return "locked";
  if(ui.mastered)return "mastered"; if(ui.passed)return "reviewed";
  if(ui.started)return "in progress"; return "available"; }
function weakTopics(){ return GT.filter(t=>{const s=tStat(t.id);return s.a>=3&&s.c/s.a<0.7;})
  .sort((a,b)=>tStat(a.id).c/tStat(a.id).a - tStat(b.id).c/tStat(b.id).a); }
function weakCards(){ return ALLCARDS.filter(c=>cardState(c.k).b===1); }
function weakDrillKeys(){ return Object.keys(S.weak); }

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================= QUIZ ENGINE ================= */
let QZ=null;
function openQuiz(title,questions,onEnd,opts){ QZ={title,qs:questions,i:0,score:0,onEnd,opts:opts||{}}; renderQ(); $("#modal").classList.add("open"); }
function closeModal(){ $("#modal").classList.remove("open"); $("#modal").innerHTML=""; QZ=null; FC=null; render(); }
function renderQ(){
  const q=QZ.qs[QZ.i];
  let h='<div class="mbox"><div class="mhead"><h3>'+QZ.title+'</h3><div class="row"><span class="qprog">'+(QZ.i+1)+' / '+QZ.qs.length+'</span><button class="xclose" onclick="closeModal()">✕</button></div></div>';

  q._ord=q._ord||shuffle(q.o.map((_,i)=>i));
  q._ord.forEach(oi=>{ h+='<button class="opt" onclick="answerQ('+oi+')">'+q.o[oi]+'</button>'; });
  h+='<div id="qfb"></div></div>';
  $("#modal").innerHTML=h;
}
function answerQ(oi){
  const q=QZ.qs[QZ.i], right=oi===q.a;
  document.querySelectorAll("#modal .opt").forEach((b,idx)=>{ b.disabled=true;
    const optIdx=q._ord[idx];
    if(optIdx===q.a)b.classList.add("right"); else if(optIdx===oi&&!right)b.classList.add("wrong"); });
  if(right)QZ.score++;
  // stats
  if(q.src){ const st=S.gt[q.src.gt]||(S.gt[q.src.gt]={a:0,c:0,best:0}); st.a++; if(right)st.c++;
    const wk="d:"+q.src.gt+":"+q.src.qi;
    if(!right){ S.weak[wk]=S.weak[wk]||{miss:0,hit:0}; S.weak[wk].miss++; S.weak[wk].hit=0; }
    else if(S.weak[wk]){ S.weak[wk].hit++; if(S.weak[wk].hit>=2)delete S.weak[wk]; } }
  save();
  const fb='<div class="feedback"><b>'+(right?"✓ Correcto.":"✗ La respuesta correcta: "+q.o[q.a])+'</b><br>'+(q.e||"")+'</div>'+
    '<button class="btn pri" onclick="nextQ()">'+(QZ.i+1<QZ.qs.length?"Siguiente →":"Ver resultado")+'</button>';
  $("#qfb").innerHTML=fb;
}
function nextQ(){
  QZ.i++;
  if(QZ.i<QZ.qs.length){renderQ();return;}
  const pct=Math.round(100*QZ.score/QZ.qs.length);
  // best-run tracking per topic
  if(QZ.opts.gt){ const st=S.gt[QZ.opts.gt]||(S.gt[QZ.opts.gt]={a:0,c:0,best:0}); if(pct>st.best)st.best=pct; }
  const passed=QZ.opts.min?pct>=QZ.opts.min:null;
  let h='<div class="mbox"><div class="mhead"><h3>'+QZ.title+'</h3><button class="xclose" onclick="closeModal()">✕</button></div>';
  h+='<div class="result-ring">'+pct+'%</div><p style="text-align:center" class="muted">'+QZ.score+' de '+QZ.qs.length+' correctas';
  if(passed!==null)h+=passed?' — <span style="color:var(--green)">objetivo superado ('+QZ.opts.min+'%)</span>':' — <span style="color:var(--red)">objetivo: '+QZ.opts.min+'%. Inténtalo de nuevo.</span>';

function drillQs(gtId,n){ const t=GT.find(x=>x.id===gtId); if(!t)return[];
  return shuffle(t.d.map((d,qi)=>({q:d.q,o:d.o,a:d.a,e:d.e,src:{gt:gtId,qi}}))).slice(0,n||t.d.length); }
function startDrill(gtId,n,min,onEnd){ const t=GT.find(x=>x.id===gtId);
  openQuiz(t.t,drillQs(gtId,n),onEnd,{gt:gtId,min:min||0}); }
function vquizQs(filter,n){
  let pool=[];V.forEach((it,i)=>{ if(matchF(it,filter))pool.push({it,i}); });
  pool=shuffle(pool).slice(0,n);
  const all=V.map(x=>x.en);
  return pool.map(p=>{ const wrong=shuffle(all.filter(e=>e!==p.it.en)).slice(0,2);
    const opts=[p.it.en].concat(wrong);
    return {q:"¿Qué significa <b>"+p.it.es+"</b>?<br><span class='muted small'><em>"+p.it.ex+"</em></span>",o:opts,a:0,e:p.it.es+" = "+p.it.en}; });
}
function matchF(it,f){ if(!f)return true; if(f.t&&it.t!==f.t)return false; if(f.d&&it.d!==f.d)return false; return true; }

/* ================= FLASHCARDS ================= */
let FC=null;
function deckCards(filter){
  let list=ALLCARDS.filter(c=>{ if(filter&&filter.gc)return c.kind==="g";
    if(c.kind==="g")return !filter||(!filter.t&&!filter.d);
    return matchF(c.ref,filter); });
  return list;
}
function startCards(filter,n,onEnd,title){
  let list=deckCards(filter);
  list.sort((a,b)=>{const sa=cardState(a.k),sb=cardState(b.k);return (sa.b-sb.b)||(sa.seen-sb.seen);});
  const lowGroups={};list.forEach(c=>{const b=cardState(c.k).b;(lowGroups[b]=lowGroups[b]||[]).push(c);});
  let sess=[];[0,1,2,3].forEach(b=>{if(lowGroups[b])sess=sess.concat(shuffle(lowGroups[b]));});
  sess=sess.slice(0,n||15);
  if(!sess.length){toast("No cards match this deck.");return;}
  FC={list:sess,i:0,flip:false,onEnd,title:title||"Flashcards",again:0,good:0};
  renderFC(); $("#modal").classList.add("open");
}

  const ex=c.kind==="v"?r.ex:r.ex;

  let h='<div class="mbox"><div class="mhead"><h3>'+FC.title+'</h3><div class="row"><span class="qprog">'+(FC.i+1)+' / '+FC.list.length+'</span><button class="xclose" onclick="closeModal()">✕</button></div></div>';

  h+='<div class="fc-face bk"><span class="fc-tag">'+tag+'</span><div class="fc-word" style="font-size:22px">'+back+'</div>'+(ex?'<div class="fc-ex">'+ex+'</div>':'')+'<div class="fc-hint">valora tu respuesta abajo</div></div>';
  h+='</div></div>';
  if(FC.flip){ h+='<div class="rate"><button class="r0" onclick="rateFC(0)">Again</button><button class="r1" onclick="rateFC(1)">Hard</button><button class="r2" onclick="rateFC(2)">Good</button><button class="r3" onclick="rateFC(3)">Mastered</button></div>'; }
  else h+='<p class="small" style="text-align:center;color:var(--faint)">Piensa la respuesta, luego gira la tarjeta.</p>';
  h+='</div>'; $("#modal").innerHTML=h;
}
function flipFC(){FC.flip=!FC.flip;renderFC();}
function rateFC(r){
  const st=cardState(FC.list[FC.i].k); st.seen++;
  if(r===0){st.b=1;FC.again++;}
  else if(r===1){st.b=Math.max(1,st.b);FC.again++;}
  else if(r===2){st.b=Math.min(2,Math.max(st.b,1)+1);FC.good++;}
  else {st.b=3;FC.good++;}
  save();
  FC.i++;FC.flip=false;
  if(FC.i<FC.list.length){renderFC();return;}
  const cb=FC.onEnd,total=FC.list.length,good=FC.good;
  let h='<div class="mbox"><div class="mhead"><h3>'+FC.title+'</h3><button class="xclose" onclick="closeModal()">✕</button></div>';
  h+='<div class="result-ring">'+total+'</div><p style="text-align:center" class="muted">tarjetas repasadas — '+good+' bien, '+FC.again+' a repasar</p>';

  $("#modal").innerHTML=h;

  if(weakDrillKeys().length>=5)return {t:"Clear your review queue",d:weakDrillKeys().length+" weak items are blocking consolidation.",fn:"go('review')"};
  if(wt.length)return {t:"Repair: "+wt[0].t,d:"Accuracy below 70% — drill it before moving on.",fn:"go('grammar','"+wt[0].id+"')"};
  const m=MISSIONS.find(m=>{const md=(S.missions[m.id]||{}).done||{};return m.tasks.some((_,i)=>!md[i]);});
  const ui=UNITS.findIndex((u,i)=>unitAvail(u,i)&&!unitInfo(u).passed);
  if(ui>-1&&(!m||Math.random()<2))return {t:"Continue Unit "+UNITS[ui].id+": "+UNITS[ui].t,d:"Next step on the roadmap · ~"+UNITS[ui].h+"h · "+UNITS[ui].lv,fn:"go('roadmap',"+UNITS[ui].id+")"};
  if(m)return {t:"Mission: "+m.t,d:m.obj,fn:"go('missions')"};
  return {t:"Full DELE simulation",d:"Everything is mastered — time your exam tasks.",fn:"go('dele')"};
}

function unlockAsk(id){ const u=UNITS.find(x=>x.id===id); unitInfo(u).unlocked=true; toast("Unidad "+id+" desbloqueada — el orden recomendado sigue siendo secuencial."); render(); }
function unitDeckFilter(u){ const f={}; if(u.doms.length===1)f.d=u.doms[0]; return u.doms.length===1?f:{_doms:u.doms,_vt:u.vt}; }
function startUnitCards(id){ const u=UNITS.find(x=>x.id===id); unitInfo(u).started=true;
  let list=ALLCARDS.filter(c=>c.kind==="v"&&(u.doms.includes(c.ref.d)||(u.vt||[]).includes(c.ref.t)));
  if(!list.length){toast("Esta unidad no tiene mazo propio.");return;}
  // temporary custom session
  list.sort((a,b)=>cardState(a.k).b-cardState(b.k).b);
  FC={list:shuffle(list).slice(0,15),i:0,flip:false,onEnd:null,title:"Unidad "+u.id+" — mazo",again:0,good:0};
  renderFC();$("#modal").classList.add("open");
}
function unitCheck(id){ const u=UNITS.find(x=>x.id===id); unitInfo(u).started=true;
  let qs=[]; u.gts.forEach(g=>{qs=qs.concat(drillQs(g));});
  qs=shuffle(qs).slice(0,u.gts.length?6:0);
  const vn=8-qs.length;
  if(vn>0){ let vpool=[]; u.doms.forEach(d=>{vpool=vpool.concat(vquizQs({d:d},Math.ceil(vn/u.doms.length)));});
    if(u.vt)u.vt.forEach(t=>{vpool=vpool.concat(vquizQs({t:t},2));});
    qs=qs.concat(shuffle(vpool).slice(0,vn)); }
  openQuiz("Mastery check — Unidad "+u.id,shuffle(qs).slice(0,8),pct=>{
    const ui=unitInfo(u);
    if(pct>=75){ui.passed=true;if(pct>=90)ui.mastered=true;
      u.gts.forEach(g=>{const st=S.gt[g]||(S.gt[g]={a:0,c:0,best:0});if(pct>st.best)st.best=pct;});
      toast(pct>=90?"Unidad "+u.id+" DOMINADA":"Unidad "+u.id+" superada");}
    ui.score=Math.max(ui.score||0,pct);
  },{min:75});
}
